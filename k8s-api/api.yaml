apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: w9-api:1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ERROR_RATE
              value: "0"
            - name: VERSION
              value: "v2"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
  strategy:
    canary:
      analysis: 
        templates:
          - templateName: success-rate-check
        args:
          - name: service-name
            value: api
      steps: 
        - setWeight: 25
        - pause:
            duration: 30s # Đứng ở 25% trong 30s (Vẫn liên tục check lỗi ngầm)
        - setWeight: 50
        - pause:
            duration: 30s # Lên 50% đứng tiếp 30s (Vẫn liên tục check lỗi ngầm)
        - setWeight: 100   # Hoàn thành 100% (Analysis tự động tắt khi kết thúc)
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: api
  type: ClusterIP