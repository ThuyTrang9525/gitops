apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-config
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trang Portfolio & Kết Nối Hệ Thống</title>
        <style>
            :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f8fafc; --text: #0f172a; }
            body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
            .container { max-width: 650px; width: 100%; display: flex; flex-direction: column; gap: 24px; }
            .card { background: white; padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
            .profile-header { text-align: center; margin-bottom: 20px; }
            .avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #3b82f6); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: bold; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }
            h1 { font-size: 24px; margin: 0 0 8px 0; color: #1e293b; }
            .role { color: var(--primary); font-weight: 600; font-size: 16px; margin: 0 0 16px 0; text-transform: uppercase; letter-spacing: 0.05em; }
            .bio { color: #64748b; font-size: 15px; line-height: 1.6; margin-bottom: 20px; text-align: justify; }
            .skills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
            .badge { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; padding: 6px 14px; border-radius: 9999px; font-size: 14px; font-weight: 500; }
            
            /* Styles cho Form */
            h2 { font-size: 20px; margin-top: 0; margin-bottom: 16px; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
            .form-group { margin-bottom: 16px; text-align: left; }
            label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #475569; }
            input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: border-color 0.2s; }
            input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
            button { width: 100%; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
            button:hover { background-color: var(--primary-hover); }
            
            .status-box { padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center; }
            .status-loading { background: #f1f5f9; color: #475569; }
            .status-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
            .status-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card profile-header">
                <div class="avatar">TT</div>
                <h1 id="name">Đang tải dữ liệu...</h1>
                <div class="role" id="role">Loading...</div>
                <p class="bio" id="bio">Đang kết nối API hạ tầng để lấy thông tin giới thiệu bản thân cá nhân...</p>
                <div class="skills-container" id="skills"></div>
            </div>

            <div class="card">
                <h2>Liên hệ & Gửi lời nhắn</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="formName">Họ và tên</label>
                        <input type="text" id="formName" placeholder="Nhập tên của bạn" required>
                    </div>
                    <div class="form-group">
                        <label for="formEmail">Email liên hệ</label>
                        <input type="email" id="formEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="formMessage">Lời nhắn</label>
                        <textarea id="formMessage" rows="4" placeholder="Nhập nội dung tin nhắn gửi tới Backend API..." required></textarea>
                    </div>
                    <button type="submit" id="btnSubmit">Gửi tin nhắn đi 🚀</button>
                </form>
                <div id="formStatus" class="status-box status-loading" style="margin-top: 16px; display: none;"></div>
            </div>
        </div>

        <script>
            const beBaseUrl = 'http://localhost:8081';

            // Lấy dữ liệu profile tự động từ BE (GET)
            fetch(`${beBaseUrl}/api/profile`)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    document.getElementById('name').innerText = data.name;
                    document.getElementById('role').innerText = data.role;
                    document.getElementById('bio').innerText = data.bio;
                    document.getElementById('skills').innerHTML = data.skills.map(s => `<span class="badge">${s}</span>`).join('');
                })
                .catch(() => {
                    document.getElementById('bio').innerHTML = "<span style='color:red;'>⚠️ Lỗi: Không thể kết nối tới Backend Service. Vui lòng kiểm tra lại cổng Port-Forward 8081!</span>";
                });

            // Xử lý sự kiện Submit Form (POST lên BE)
            document.getElementById('contactForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const statusBox = document.getElementById('formStatus');
                const btnSubmit = document.getElementById('btnSubmit');
                
                statusBox.style.display = 'block';
                statusBox.className = 'status-box status-loading';
                statusBox.innerText = '⏳ Đang truyền dữ liệu qua mạng lưới Kubernetes tới Backend...';
                btnSubmit.disabled = true;

                const payload = {
                    name: document.getElementById('formName').value,
                    email: document.getElementById('formEmail').value,
                    message: document.getElementById('formMessage').value
                };

                fetch(`${beBaseUrl}/api/contact`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    statusBox.className = 'status-box status-success';
                    statusBox.innerText = data.message;
                    document.getElementById('contactForm').reset(); // Xóa sạch form sau khi gửi thành công
                })
                .catch(err => {
                    statusBox.className = 'status-box status-error';
                    statusBox.innerText = '❌ Thao tác thất bại. Lỗi kết nối API nội bộ!';
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                });
            });
        </script>
    </body>
    </html>