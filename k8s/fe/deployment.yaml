apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
        - name: fe
          image: 205trang/portfolio-fe:latest
          ports:
            - containerPort: 80
