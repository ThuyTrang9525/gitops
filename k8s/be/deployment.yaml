apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: be
  template:
    metadata:
      labels:
        app: be
    spec:
      containers:
        - name: be
          image: 205trang/portfolio-be:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: be-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
