server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend service trong cùng K8s namespace
    location /api/ {
        proxy_pass http://be:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10M;
    }

    # Proxy /uploads/* → backend (để hiển thị ảnh đã upload)
    location /uploads/ {
        proxy_pass http://be:8080/uploads/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
